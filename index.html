<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mmcode.net.pl</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a0b2e;
            --accent-color: #7d5fff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --success-color: #2ecc71;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            /* Efekt fioletowych "deficytów"/gradientów w tle */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(125, 95, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(125, 95, 255, 0.1) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/stardust.png'); /* Subtelny efekt ziarna */
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Logo / Nazwa strony */
        .logo {
            position: absolute;
            top: 40px;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            color: white;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .logo:hover {
            text-shadow: 0 0 15px var(--accent-color);
        }

        /* Przycisk 3D */
        .order-btn {
            padding: 22px 70px;
            font-size: 1.6rem;
            font-weight: 600;
            color: white;
            background: var(--accent-color);
            border: none;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 9px 0 #5741b8, 0 15px 25px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .order-btn:hover {
            background-color: #8c72ff;
        }
        
        .order-btn:active {
            box-shadow: 0 4px 0 #5741b8;
            transform: translateY(5px);
        }

        /* Modal (Formularz) */
        #formOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        #formContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(40, 30, 60, 0.9);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h2 { margin-top: 0; font-weight: 600; color: var(--accent-color); }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--success-color);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .submit-btn:hover { background: #27ae60; transform: scale(1.02); }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <a href="." class="logo">mmcode.net.pl</a>

    <button class="order-btn" onclick="openForm()">ZAMÓW</button>

    <div id="formOverlay">
        <div id="formContainer">
            <span class="close-btn" onclick="closeForm()">×</span>
            <h2>Nowe zamówienie</h2>
            <form id="orderForm">
                <input type="tel" id="phone" placeholder="Numer telefonu" required>
                <input type="email" id="email" placeholder="Adres e-mail" required>
                <input type="text" id="title" placeholder="Tytuł zamówienia" required>
                <textarea id="desc" rows="5" placeholder="Opis zamówienia - co mamy zakodować?" required></textarea>
                <button type="submit" class="submit-btn">WYŚLIJ ZAMÓWIENIE</button>
            </form>
        </div>
    </div>

    <script>
        function openForm() { document.getElementById('formOverlay').style.display = 'block'; }
        function closeForm() { document.getElementById('formOverlay').style.display = 'none'; }

        // Zamykanie po kliknięciu poza formularz
        window.onclick = function(event) {
            if (event.target == document.getElementById('formOverlay')) { closeForm(); }
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // TUTAJ WKLEJ LINK ZE SWOJEGO WORKERA CLOUDFLARE:
            const workerURL = "royal-cloud-8f0d.grapliss88.workers.dev"; 

            const data = {
                username: "System mmcode.net.pl",
                embeds: [{
                    title: "🚀 Nowe zamówienie wpadło!",
                    color: 8216575,
                    fields: [
                        { name: "📱 Telefon", value: document.getElementById('phone').value, inline: true },
                        { name: "📧 Email", value: document.getElementById('email').value, inline: true },
                        { name: "📌 Projekt", value: document.getElementById('title').value },
                        { name: "📝 Opis", value: document.getElementById('desc').value }
                    ],
                    footer: { text: "Wysłano ze strony mmcode.net.pl" },
                    timestamp: new Date().toISOString()
                }]
            };

            const btn = e.target.querySelector('button');
            btn.innerText = "WYSYŁANIE...";
            btn.disabled = true;

            fetch(workerURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert('Dzięki! Zamówienie zostało wysłane na nasz serwer Discord.');
                closeForm();
                document.getElementById('orderForm').reset();
            }).catch(err => {
                alert('Błąd! Spróbuj ponownie później.');
                console.error(err);
            }).finally(() => {
                btn.innerText = "WYŚLIJ ZAMÓWIENIE";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
